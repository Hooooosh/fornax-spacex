<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpaceX</title>
    <script type="module" src="/src/main.js"></script>
    <link rel="stylesheet" href="./src/styles/main.css">
</head>

<body>
    <div id="loading-overlay"
        class="fixed top-0 left-0 w-full h-screen z-50 select-none backdrop-blur-sm flex justify-center items-center font-mono text-lg">
        Kapcsolódás a SpaceX szerveréhez.
    </div>
    <main class="p-6 absolute w-full min-h-screen">
        <!-- fenti wrap -->
        <section class="fixed top-0 left-0 w-full flex justify-center pointer-events-none font-mono z-10">
            <div class="rounded-b-2xl border border-t-0 border-white/5 p-1.5 pt-0">
                <div
                    class="flex gap-11 rounded-b-xl border border-t-0 border-white/10 bg-neutral-500/5 py-3 pb-3.5 px-14">
                    <!-- 
                    a flottába helyezett rakéták összesített teherbírása (LEO, kg),
                    a flottába helyezett rakéták átlagos kilövési költsége (a 3. pont képlete alapján).
                    -->
                    <div class="flex flex-col gap-px items-center text-center">
                        <span class="opacity-90">Összesített teherbírás</span>
                        <div id="topbar-kg" class="text-base flex gap-px duration-200">
                            <div class="opacity-40 order-last mx-0.5 leading-none text-xs flex items-center">kg</div>
                        </div>
                    </div>
                    <div class="flex flex-col gap-px items-center text-center">
                        <span class="opacity-90">Átlagos kilövési költség</span>
                        <div id="topbar-cost" class="text-base flex gap-px duration-200">
                            <div class="opacity-40 order-first mx-0.5 leading-none text-xs flex items-center">$</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- card wrap -->
        <section 
            class="absolute pt-44 pb-20 left-0 w-full flex flex-wrap justify-center items-center px-10 md:px-20 gap-4 gap-y-14"
            id="card-wrapper">
        </section>

        <!-- table wrap -->
        <section id="table-backdrop"
            class="duration-500 absolute flex justify-center items-center left-0 top-0 w-full h-screen font-mono pointer-events-none backdrop-blur-xs z-10">
            <div id="table-wrapper"
                class="duration-500 px-8 py-6 bg-neutral-800 border border-white/20 rounded-lg relative overflow-clip">
                <div class="text-xl font-medium text-center mb-5">Összehasonlítás</div>
                <table class="gap-x-2">
                    <thead>
                        <tr id="compare-table-head">

                        </tr>
                    </thead>
                    <tbody id="compare-table-body" class="text-sm">

                    </tbody>
                </table>

                <!-- close btn -->
                <div id="table-close-btn"
                    class="duration-300 rounded-bl-lg cursor-pointer border-b border-l border-white/20 absolute top-0 right-0 flex items-center justify-center text-2xl w-10 aspect-square leading-none card-select-button">
                    <img src="/ri/cross.svg" class="duration-150 w-5 aspect-square" alt="">
                </div>
            </div>
        </section>


        <!-- aktiv toggle gomb -->
        <div class="absolute top-22 left-0 w-full flex justify-center">
            <div id="active-toggle-button"
                class="rounded-lg border border-white/10 bg-neutral-500/5 hover:bg-neutral-500/10 active:scale-[97%] select-none hover:scale-[103%] duration-200 cursor-pointer font-mono px-6 py-3 text-sm">
                Csak az aktív rakéták
            </div>
        </div>
    </main>


    <!-- CARD -->
    <template id="card-template">
        <div
            class="card max-w-[230px] w-full max-h-[60vh] h-[350px] rounded-2xl border border-white/5 p-1.5 duration-200 relative">
            <!-- kártya inner -->
            <div
                class="bg-neutral-500/5 relative overflow-clip flex items-end rounded-xl border border-white/15 h-full z-10">

                <!-- bg -->
                <img src="" alt=""
                    class="pointer-events-none duration-300 card-bg-1 brightness-40 w-full h-full absolute top-0 left-0 object-center object-cover opacity-0">
                <img src="" alt=""
                    class="pointer-events-none duration-300 card-bg-2 brightness-40 w-full h-full absolute top-0 left-0 object-center object-cover opacity-0">

                <!-- selectbtn -->
                <div class="card-select-btn duration-300 rounded-bl-lg cursor-pointer border-b border-l border-white/20 absolute top-0 right-0 flex items-center
                     justify-center text-2xl w-10 aspect-square leading-none card-select-button">
                    <img src="/ri/cross.svg" class="img-add duration-150 w-5 aspect-square -rotate-45" alt="">
                </div>

                <!-- text -->
                <div class="z-10 font-mono flex flex-col w-full">
                    <div
                        class="text-xl font-medium tracking-wide card-title bg-black/80 w-full py-1.5 px-3 pointer-events-none select-none">
                        NAME
                    </div>
                    <div class="bg-black/70 px-2 text-sm flex flex-col py-2">
                        <p>
                            CPL: <span class="cpl-output">0</span>
                        </p>
                        <p>
                            Teherbír. LEO: <span class="leo-output">0</span>
                        </p>
                    </div>
                </div>
            </div>

            <!-- add to fleetbtn -->
            <div class="fleet-toggle-button-wrapper absolute bottom-0 left-0 w-full h-20 px-4 duration-300 opacity-0">
                <div class="fleet-toggle-button bg-neutral-900 cursor-pointer -mt-1.5 border border-t-0 rounded-b-lg border-neutral-400/30 w-full py-3 hover:scale-[1.03] active:scale-[0.97] origin-top duration-200
                    select-none flex items-center justify-center font-medium font-mono text-center text-sm">

                </div>
            </div>
        </div>
    </template>


    <!-- PÖRGŐ TEXT -->
    <template id="waterfall-text-template">
        <div class="overflow-clip h-[1em]"
            style="mask-image:'linear-gradient(to bottom, transparent, black 10%, black 90%, transparent)'">
            <div class="flex flex-col items-center waterfall-text-inner">

            </div>
        </div>
    </template>

</body>

</html>
